services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: karlo
      POSTGRES_PASSWORD: karlo
      POSTGRES_DB: karlo_wear
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U karlo -d karlo_wear"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
